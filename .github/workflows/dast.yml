name: DAST - OWASP ZAP Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Mondays at 02:00 UTC

jobs:
  zap-scan:
    name: DAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d -p 3000:3000 bkimminich/juice-shop
          sleep 30

      - name: Resolve Docker bridge host IP
        run: |
          HOST_IP=$(docker network inspect bridge \
            -f '{{range .IPAM.Config}}{{.Gateway}}{{end}}')
          echo "HOST_IP=$HOST_IP" >> $GITHUB_ENV

      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://${{ env.HOST_IP }}:3000'
          fail_action: false          # Juice Shop is intentionally vulnerable — don't fail on findings
          artifact_name: 'zap-scan-results'